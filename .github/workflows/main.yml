name: Auto Generator and Secure Sync

on:
  schedule:
    - cron: '0 */3 * * *' # Runs automatically every 3 hours
  workflow_dispatch:      # Option to run manually from GitHub Actions tab
  repository_dispatch:    # Option to trigger externally (via API)
    types: [trigger-fetch]

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo 1 (Public)
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Decryptor Engine
        env:
          IVANZ_BASE: ${{ secrets.IVANZ_BASE }}
          EVENTS_PATH: ${{ secrets.EVENTS_PATH }}
          CATEGORIES_PATH: ${{ secrets.CATEGORIES_PATH }}
          SPORTS_PATH: ${{ secrets.SPORTS_PATH }}
          IVANZ_ALPHA: ${{ secrets.IVANZ_ALPHA }}
          IVANZ_MAPPED: ${{ secrets.IVANZ_MAPPED }}
          DECRYPTION_KEYS: ${{ secrets.DECRYPTION_KEYS }}
        run: python main.py

      # Checkout your private Repo 2 into a subdirectory
      - name: Checkout Repo 2 (Private)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TARGET_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          path: private-repo
          persist-credentials: true

      # Copying the generated plain JSON files into the private repo folder
      - name: Sync Outputs to Repo 2
        run: |
          cp live-events.json private-repo/
          cp categories.json private-repo/
          cp sports.json private-repo/

      # Commit and push to private repository (triggers Vercel deployment automatically)
      - name: Commit and Push to Private Repo
        run: |
          cd private-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live-events.json categories.json sports.json
          if git diff --cached --quiet; then
            echo "No data changes detected. Skipping push."
          else
            git commit -m "System Synced - Plain JSON Payloads Updated [skip ci]"
            git push
          fi
