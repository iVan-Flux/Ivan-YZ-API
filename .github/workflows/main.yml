name: Auto Generator and Secure Sync

on:
  schedule:
    - cron: '0 */3 * * *' # প্রতি ৩ ঘন্টা পর অটো রান হবে
  workflow_dispatch:      # গিটহাব থেকে ম্যানুয়ালি রান করার অপশন
  repository_dispatch:    # ক্রন-জব বা বাহ্যিক API ট্রিগার
    types: [trigger-fetch]

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo 1 (Public)
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Pycryptodome & Requests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Decryptor & Encryptor Engine
        env:
          PLAYZ_BASE: ${{ secrets.PLAYZ_BASE }}
          AES_SECRET: ${{ secrets.AES_SECRET }}
          EVENTS_PATH: ${{ secrets.EVENTS_PATH }}
          CATEGORIES_PATH: ${{ secrets.CATEGORIES_PATH }}
          SPORTS_PATH: ${{ secrets.SPORTS_PATH }}
          PLAYZ_ALPHA: ${{ secrets.PLAYZ_ALPHA }}
          PLAYZ_MAPPED: ${{ secrets.PLAYZ_MAPPED }}
          DECRYPTION_KEYS: ${{ secrets.DECRYPTION_KEYS }}
        run: python main.py

      # আপনার Repo 2 (Private) ক্লোন করা হচ্ছে একটি সাবডিরেক্টরিতে
      - name: Checkout Repo 2 (Private)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TARGET_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          path: private-repo
          persist-credentials: true

      # নতুন তৈরি হওয়া ফাইল ৩টি প্রাইভেট ফোল্ডারে কপি করা হচ্ছে
      - name: Sync Outputs to Repo 2
        run: |
          cp live-events.json private-repo/
          cp categories.json private-repo/
          cp sports.json private-repo/

      # প্রাইভেট রিপোজিটরিতে ফাইল পুশ করা (যা ভার্সেল অটো-ডেপ্লয়মেন্ট ট্রিগার করবে)
      - name: Commit and Push to Private Repo
        run: |
          cd private-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live-events.json categories.json sports.json
          if git diff --cached --quiet; then
            echo "No data changes detected. Skipping push."
          else
            git commit -m "System Synced - Encrypted Payloads Updated [skip ci]"
            git push
          
          fi
